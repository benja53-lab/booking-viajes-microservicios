server:
  port: 9090

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:

        - id: ms-usuarios
          uri: http://localhost:8090
          predicates:
            - Path=/api/usuarios/**

        - id: ms-hoteles
          uri: http://localhost:8082
          predicates:
            - Path=/api/hoteles/**

        - id: ms-vuelos
          uri: http://localhost:8089
          predicates:
            - Path=/api/vuelos/**

        - id: ms-destinos
          uri: http://localhost:8085
          predicates:
            - Path=/api/destinos/**

        - id: ms-paquetes
          uri: http://localhost:8086
          predicates:
            - Path=/api/paquetes/**

        - id: ms-reservas-hotel
          uri: http://localhost:8083
          predicates:
            - Path=/api/reservas-hotel/**

        - id: ms-reservas-vuelo
          uri: http://localhost:8081
          predicates:
            - Path=/api/reservas-vuelo/**

        - id: ms-pagos
          uri: http://localhost:8084
          predicates:
            - Path=/api/pagos/**

        - id: ms-resenas
          uri: http://localhost:8088
          predicates:
            - Path=/api/resenas/**

        - id: ms-notificaciones
          uri: http://localhost:8087
          predicates:
            - Path=/api/notificaciones/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG